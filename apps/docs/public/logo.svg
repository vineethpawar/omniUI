<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" role="img" aria-label="plyxui logo">
  <!-- plyxui mark. 3x3 dot matrix; center dot is the brand orange.
       Dots sized to fill the viewBox so the mark stays legible at favicon
       resolutions (16px, 32px). -->
  <g fill="currentColor">
    <circle cx="5"  cy="5"  r="2.4"/>
    <circle cx="12" cy="5"  r="2.4"/>
    <circle cx="19" cy="5"  r="2.4"/>
    <circle cx="5"  cy="12" r="2.4"/>
    <circle cx="19" cy="12" r="2.4"/>
    <circle cx="5"  cy="19" r="2.4"/>
    <circle cx="12" cy="19" r="2.4"/>
    <circle cx="19" cy="19" r="2.4"/>
  </g>
  <circle cx="12" cy="12" r="2.4" fill="#FF5C00"/>
</svg>
