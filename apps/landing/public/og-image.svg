<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FF5C00" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF5C00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0807"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 3x3 dot brand mark + name, top-left -->
  <g transform="translate(80, 76)">
    <g transform="scale(2.5)" fill="#FAF5F0">
      <circle cx="4"  cy="4"  r="2.4"/>
      <circle cx="12" cy="4"  r="2.4"/>
      <circle cx="20" cy="4"  r="2.4"/>
      <circle cx="4"  cy="12" r="2.4"/>
      <circle cx="12" cy="12" r="2.4" fill="#FF5C00"/>
      <circle cx="20" cy="12" r="2.4"/>
      <circle cx="4"  cy="20" r="2.4"/>
      <circle cx="12" cy="20" r="2.4"/>
      <circle cx="20" cy="20" r="2.4"/>
    </g>
    <text x="84" y="48" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="36" font-weight="700" fill="#FAF5F0" letter-spacing="-0.5">plyxui</text>
  </g>

  <!-- Headline -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800">
    <text x="80" y="280" font-size="84" fill="#FAF5F0" letter-spacing="-2">One component library.</text>
    <text x="80" y="380" font-size="84" fill="#FF5C00" letter-spacing="-2">Web, native, agent-aware.</text>
  </g>

  <!-- Subline -->
  <text x="80" y="450" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="28" fill="#A39B92">
    Typed, branded, cross-platform components. First-party MCP server. Free.
  </text>

  <!-- Footer row -->
  <g transform="translate(80, 560)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#A39B92">
    <text>npm install @plyxui/*</text>
    <text x="280" fill="#FF5C00">•</text>
    <text x="320">plyxui.com</text>
    <text x="540" fill="#FF5C00">•</text>
    <text x="580">npx -y @plyxui/mcp</text>
  </g>
</svg>
